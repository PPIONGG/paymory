<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tamma VPS Projects</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #171717;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(245, 247, 250, 1)),
          #f5f7fa;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 52px 0;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #555f6d;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .project {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 18px;
        border: 1px solid #dfe4ea;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        text-decoration: none;
        box-shadow: 0 10px 28px rgba(26, 32, 44, 0.06);
      }

      .project:hover {
        border-color: #aeb8c6;
      }

      .project strong {
        display: block;
        margin-bottom: 6px;
        font-size: 1.15rem;
      }

      .project small {
        color: #667085;
      }

      .open {
        color: #0f5132;
        font-weight: 700;
        white-space: nowrap;
      }

      .coming {
        opacity: 0.7;
      }

      @media (max-width: 600px) {
        main {
          padding: 36px 0;
        }

        .project {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Tamma VPS Projects</h1>
        <p>รวมโปรเจกต์ที่รันอยู่บน VPS เครื่องนี้</p>
      </header>

      <section class="grid" aria-label="Projects">
        <a class="project" href="/paymory/login">
          <span>
            <strong>Paymory</strong>
            <small>แอปติดตามค่าใช้จ่ายสำหรับคู่รัก</small>
          </span>
          <span class="open">Open</span>
        </a>

        <div class="project coming">
          <span>
            <strong>Next project</strong>
            <small>พร้อมเพิ่มโปรเจกต์ถัดไปใต้ path ใหม่</small>
          </span>
          <span class="open">Soon</span>
        </div>
      </section>
    </main>
  </body>
</html>
